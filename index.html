<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>🍱</title>
        <link rel="stylesheet" href="css/style.css" />
        <script src="https://unpkg.com/feather-icons"></script>
    </head>
    <body>
        <div class="container">
            <div class="hour">
                <div class="clock">
                    <div id="hour"></div>
                    <div id="separator"></div>
                    <div id="minutes"></div>
                </div>
                <div id="greetings"></div>
            </div>
            <div class="secon">
                <div class="secon__date">
                    <div id="month"></div>
                    <div id="day"></div>
                </div>
                <div class="secon__weather">
                    <div class="weather-icon">
                        <img src="icons/unknown.png" />
                    </div>
                    <div class="temperature-value">
                        <p>- °<span>c</span></p>
                    </div>
                    <div class="temperature-description">
                        <p></p>
                    </div>
                </div>
            </div>
            <div class="qlink">
                <a
                    href="https://myanimelist.net/animelist/cjghost2000"
                    target="blank"
                    class="qlink__link qlink__link-1"
                >
                    <i class="qlink__icon" data-feather="list"></i>
                </a>
                <a
                    target="blank"
                    href="https://www.youtube.com/"
                    class="qlink__link qlink__link-2"
                >
                    <i class="qlink__icon" data-feather="youtube"></i>
                </a>
                <a
                    target="blank"
                    href="https://github.com/cjghost2000"
                    class="qlink__link qlink__link-3"
                >
                    <i class="qlink__icon" data-feather="github"></i>
                </a>
                <a
                    target="blank"
                    href="https://www.twitch.tv/directory/following"
                    class="qlink__link qlink__link-4"
                >
                    <i class="qlink__icon" data-feather="twitch"></i>
                </a>
                <a href="https://outlook.live.com/mail/inbox" class="qlink__link qlink__link-5">
                    <i class="qlink__icon" data-feather="mail"></i>
                </a>
                <a
                    href="https://github.com/Igglybuff/awesome-piracy"
                    class="qlink__link qlink__link-6"
                >
                    <i class="qlink__icon" data-feather="flag"></i>
                </a>
            </div>

            <div class="card qlist qlist__3">
                <i class="qlist__head" data-feather="music"></i>
                <a
                    href="https://www.youtube.com/watch?v=dQw4w9WgXcQ"
                    class="qlist__link"
                    >Inspirational</a
                >
                <a
                    href="https://www.youtube.com/watch?v=dQw4w9WgXcQ"
                    class="qlist__link"
                    >Classic</a
                >
                <a
                    href="https://www.youtube.com/watch?v=dQw4w9WgXcQ"
                    class="qlist__link"
                    >Oldies</a
                >
                <a
                    href="https://www.youtube.com/watch?v=dQw4w9WgXcQ"
                    class="qlist__link"
                    >Rock</a
                >
            </div>

            <div class="card qlist qlist__4">
                <i class="qlist__head" data-feather="coffee"></i>
                <a href="https://www.linkedin.com" class="qlist__link"
                    >LinkedIn</a
                >
                <a href="https://steamcommunity.com/id/cjghost2000/" class="qlist__link">Steam</a>
                <a href="https://twitter.com/cjghost2001" class="qlist__link">Twitter</a>
                <a href="https://www.reddit.com/" class="qlist__link"
                    >Reddit</a
                >
            </div>
        </div>
        <script src="js/time.js"></script>
        <script src="js/weather.js"></script>
        <script src="js/greeting.js"></script>
        <script>
            feather.replace();
        </script>
    </body>
</html>
